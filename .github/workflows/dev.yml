name: Run dev job
on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * *"
concurrency:
  group: pages-dev
  cancel-in-progress: true
jobs:
  run:
    uses: ./.github/workflows/_run.yml
    with:
      branch: dev
      deploy_dir: dev
      send_telegram: ${{ github.event_name == 'schedule' }}
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      TG_TOKEN: ${{ secrets.TG_TOKEN_DEV }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID_DEV }}
