name: Run prod job
on:
  workflow_dispatch:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 17 * * *"
    - cron: "30 11 * * *"
concurrency:
  group: pages-main
  cancel-in-progress: true
jobs:
  run:
    uses: ./.github/workflows/_run.yml
    with:
      branch: main
      #send_telegram: ${{ github.event_name == 'schedule' && github.event.schedule == '30 11 * * *' }}
      send_telegram: true
    secrets:
      CLAUDE_CONFIG: ${{ secrets.CLAUDE_CONFIG }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      TG_TOKEN: ${{ secrets.TG_TOKEN_PROD }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID_PROD }}
