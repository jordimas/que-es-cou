name: Run prod job
on:
  workflow_dispatch:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 1,9,13,17,21 * * *"
    - cron: "0 5 * * *"
concurrency:
  group: pages-main
  cancel-in-progress: true
jobs:
  run:
    uses: ./.github/workflows/_run.yml
    with:
      branch: main
      send_telegram: ${{ github.event_name == 'schedule' && github.event.schedule == '0 5 * * *' }}
    secrets:
      CLAUDE_CONFIG: ${{ secrets.CLAUDE_CONFIG }}
      TG_TOKEN: ${{ secrets.TG_TOKEN_PROD }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID_PROD }}
