name: Run (reusable)
on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      deploy_dir:
        required: false
        type: string
        default: ""
      send_telegram:
        required: false
        type: boolean
        default: true
    secrets:
      CLAUDE_CONFIG:
        required: true
      TG_TOKEN:
        required: true
      TG_CHAT_ID:
        required: true

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Restore telegram.json from storage branch
        run: |
          BRANCH=${{ inputs.branch }}
          git fetch origin storage --depth=1 2>/dev/null || true
          git show origin/storage:${BRANCH}/telegram.json 2>/dev/null > /tmp/telegram.json && mkdir -p output && cp /tmp/telegram.json output/telegram.json || echo "telegram.json not found in storage branch, starting fresh"

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Write Claude settings.json
        run: |
          mkdir -p ~/.claude
          printf '%s' '${{ secrets.CLAUDE_CONFIG }}' > ~/.claude/settings.json

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          TZ: Europe/Madrid
        run: make run

      - name: Update telegram.json with new hashes
        run: python telegram.py --save-only

      - name: Save telegram.json to storage branch
        run: |
          BRANCH=${{ inputs.branch }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp output/telegram.json /tmp/telegram.json
          if git fetch origin storage --depth=1 2>/dev/null; then
            git checkout -B storage origin/storage
          else
            git checkout --orphan storage
            git rm -rf . --quiet 2>/dev/null || true
          fi
          mkdir -p ${BRANCH}
          cp /tmp/telegram.json ${BRANCH}/telegram.json
          git add ${BRANCH}/telegram.json
          git commit -m "Update ${BRANCH}/telegram.json [skip ci]" || echo "Nothing to commit"
          git push origin storage
          git checkout ${BRANCH}

      - name: Send Telegram notification
        if: ${{ inputs.send_telegram }}
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python telegram.py --send-only

      - name: Rename news.html to index.html
        run: mv ${{ github.workspace }}/output/news.html ${{ github.workspace }}/output/index.html

      - name: Copy static files to output
        run: cp ${{ github.workspace }}/static/*.html ${{ github.workspace }}/static/robots.txt ${{ github.workspace }}/output/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ${{ github.workspace }}/output
          destination_dir: ${{ inputs.deploy_dir }}
          exclude_assets: '*.json'
          keep_files: true
